services:
  - type: web
    name: safemap-backend
    runtime: python
    pythonVersion: 3.11
    rootDir: backend
    buildCommand: uv sync
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        scope: run
        # Set this in Render dashboard under Environment variables
      - key: DATABASE_URL
        scope: run
        fromDatabase:
          name: safemap-db
          property: connectionString
      - key: FRONTEND_URL
        scope: run
        value: https://safemap-evorozon.vercel.app
      - key: USE_DUMMY_DATA
        scope: run
        value: "false"

  - type: pgsql
    name: safemap-db
    version: 15
    plan: free
